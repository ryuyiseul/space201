<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <!-- 메인 배경: 깊은 차콜 + 살짝 따뜻한 톤 -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1612"/>
      <stop offset="50%" stop-color="#2a221c"/>
      <stop offset="100%" stop-color="#1a1612"/>
    </linearGradient>
    <!-- 골드 텍스트 그라디언트 -->
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#C4A06A"/>
      <stop offset="50%" stop-color="#DEC99A"/>
      <stop offset="100%" stop-color="#C4A06A"/>
    </linearGradient>
    <!-- 골드 라인 -->
    <linearGradient id="goldLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#9A7B4F" stop-opacity="0"/>
      <stop offset="50%" stop-color="#DEC99A" stop-opacity="1"/>
      <stop offset="100%" stop-color="#9A7B4F" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- 우측 상단 골드 액센트 -->
  <circle cx="1100" cy="100" r="180" fill="#C4A06A" opacity="0.06"/>
  <circle cx="100" cy="550" r="220" fill="#9A7B4F" opacity="0.05"/>

  <!-- 외곽 골드 보더 (얇은 프레임) -->
  <rect x="40" y="40" width="1120" height="550" fill="none" stroke="#9A7B4F" stroke-width="1" opacity="0.4"/>
  <rect x="50" y="50" width="1100" height="530" fill="none" stroke="#C4A06A" stroke-width="0.5" opacity="0.3"/>

  <!-- 상단 로고 영역 -->
  <g transform="translate(600, 130)">
    <line x1="-80" y1="0" x2="-25" y2="0" stroke="url(#goldLine)" stroke-width="1"/>
    <text x="0" y="6" font-family="Georgia, 'Times New Roman', serif" font-size="18" letter-spacing="8" fill="#C4A06A" text-anchor="middle" font-weight="300">SPACE 201</text>
    <line x1="25" y1="0" x2="80" y2="0" stroke="url(#goldLine)" stroke-width="1"/>
  </g>

  <!-- 메인 카피 -->
  <g transform="translate(600, 280)" text-anchor="middle">
    <text x="0" y="0" font-family="'Noto Serif KR', 'Nanum Myeongjo', serif" font-size="68" fill="#ffffff" font-weight="300" letter-spacing="-1">
      공간이 바뀌면
    </text>
    <text x="0" y="90" font-family="'Noto Serif KR', 'Nanum Myeongjo', serif" font-size="78" fill="url(#gold)" font-weight="500" letter-spacing="-1">
      삶이 달라집니다
    </text>
  </g>

  <!-- 구분선 -->
  <line x1="500" y1="430" x2="700" y2="430" stroke="#C4A06A" stroke-width="1" opacity="0.6"/>

  <!-- 하단 서브카피 -->
  <text x="600" y="475" font-family="'Noto Sans KR', sans-serif" font-size="22" fill="#DEC99A" text-anchor="middle" font-weight="300" letter-spacing="2">
    누적 5,000건 이상의 시공 경험
  </text>

  <!-- 하단 CTA 박스 -->
  <g transform="translate(600, 530)">
    <rect x="-180" y="-25" width="360" height="50" fill="none" stroke="#C4A06A" stroke-width="1.2" rx="2"/>
    <text x="0" y="6" font-family="'Noto Sans KR', sans-serif" font-size="16" fill="#DEC99A" text-anchor="middle" letter-spacing="4" font-weight="400">
      현장 방문 · 3D 설계 무료
    </text>
  </g>

  <!-- 모서리 장식 (좌상) -->
  <g stroke="#C4A06A" stroke-width="1.2" fill="none" opacity="0.7">
    <path d="M 70 90 L 70 70 L 90 70"/>
  </g>
  <!-- 모서리 장식 (우상) -->
  <g stroke="#C4A06A" stroke-width="1.2" fill="none" opacity="0.7">
    <path d="M 1110 70 L 1130 70 L 1130 90"/>
  </g>
  <!-- 모서리 장식 (좌하) -->
  <g stroke="#C4A06A" stroke-width="1.2" fill="none" opacity="0.7">
    <path d="M 70 540 L 70 560 L 90 560"/>
  </g>
  <!-- 모서리 장식 (우하) -->
  <g stroke="#C4A06A" stroke-width="1.2" fill="none" opacity="0.7">
    <path d="M 1110 560 L 1130 560 L 1130 540"/>
  </g>
</svg>
